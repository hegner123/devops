name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            binary: devops-agent
            tags: agent
            asset: devops-linux-amd64
          - goos: darwin
            goarch: arm64
            binary: devops
            tags: ""
            asset: devops-darwin-arm64
          - goos: darwin
            goarch: amd64
            binary: devops
            tags: ""
            asset: devops-darwin-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            go build -tags "${{ matrix.tags }}" -trimpath -ldflags="-s -w" -o "${{ matrix.asset }}" .
          else
            go build -trimpath -ldflags="-s -w" -o "${{ matrix.asset }}" .
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            devops-linux-amd64
            devops-darwin-arm64
            devops-darwin-amd64
