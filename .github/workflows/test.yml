name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Create dummy deploy key for build
        run: mkdir -p keys && ssh-keygen -t ed25519 -f keys/deploy_key -N "" -q
      - name: Run tests
        run: go test -v -count=1 ./...
      - name: Run agent tests
        run: go test -v -count=1 -tags agent ./...
